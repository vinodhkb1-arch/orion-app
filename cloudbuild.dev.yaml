steps:
  # Build and push using kaniko — caches layers to GCS between builds.
  # This means npm install and pip install are skipped when unchanged,
  # even on fresh Cloud Build VMs.
  - name: 'gcr.io/kaniko-project/executor:latest'
    args:
      - '--destination=gcr.io/$PROJECT_ID/orion-app-dev:latest'
      - '--cache=true'
      - '--cache-ttl=168h'
      - '--context=dir:///workspace'

  # Deploy to the DEV Cloud Run service.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'orion-app-dev'
      - '--image'
      - 'gcr.io/$PROJECT_ID/orion-app-dev:latest'
      - '--platform'
      - 'managed'
      - '--region'
      - 'europe-west1'
      - '--allow-unauthenticated'

