steps:
  # Pull the last dev image to use as a layer cache.
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'docker pull gcr.io/$PROJECT_ID/orion-app-dev:latest || true'

  # Build — reuse cached layers from the previous image.
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--cache-from'
      - 'gcr.io/$PROJECT_ID/orion-app-dev:latest'
      - '-t'
      - 'gcr.io/$PROJECT_ID/orion-app-dev:latest'
      - '.'

  # Push both tags.
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/orion-app-dev:latest'

  # Deploy to the DEV Cloud Run service.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'orion-app-dev'
      - '--image'
      - 'gcr.io/$PROJECT_ID/orion-app-dev:latest'
      - '--platform'
      - 'managed'
      - '--region'
      - 'europe-west1'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/orion-app-dev:latest'
