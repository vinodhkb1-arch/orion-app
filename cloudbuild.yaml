substitutions:
  _GITHUB_REPO_OWNER: ''
  _GITHUB_REPO_NAME: ''
  _BRANCH: 'main'

steps:
  # Clone the repo from GitHub
  - name: 'gcr.io/cloud-builders/git'
    args:
      - 'clone'
      - '--branch'
      - '$_BRANCH'
      - '--depth'
      - '1'
      - 'https://github.com/$_GITHUB_REPO_OWNER/$_GITHUB_REPO_NAME.git'
      - 'source'

  # Build the Docker image from the cloned source
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/orion-app'
      - './source'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/orion-app'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'orion-app'
      - '--image'
      - 'gcr.io/$PROJECT_ID/orion-app'
      - '--platform'
      - 'managed'
      - '--region'
      - 'europe-west1'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/orion-app'
