steps:
  # Build and push using kaniko — caches layers to GCS between builds.
  - name: 'gcr.io/kaniko-project/executor:latest'
    args:
      - '--destination=gcr.io/$PROJECT_ID/orion-app:latest'
      - '--cache=true'
      - '--cache-ttl=168h'
      - '--context=dir:///workspace'

  # Deploy to Cloud Run.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'orion-app'
      - '--image'
      - 'gcr.io/$PROJECT_ID/orion-app:latest'
      - '--platform'
      - 'managed'
      - '--region'
      - 'europe-west1'
      - '--allow-unauthenticated'

