steps:
  # Pull the last image so Docker can reuse its layers as a cache.
  # The || true means the build continues on first-ever deploy (no image yet).
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'docker pull gcr.io/$PROJECT_ID/orion-app:latest || true'

  # Build — --cache-from reuses layers from the pulled image.
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--cache-from'
      - 'gcr.io/$PROJECT_ID/orion-app:latest'
      - '-t'
      - 'gcr.io/$PROJECT_ID/orion-app:latest'
      - '.'

  # Push both tags in one step.
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/orion-app:latest'

  # Deploy to Cloud Run.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'orion-app'
      - '--image'
      - 'gcr.io/$PROJECT_ID/orion-app:latest'
      - '--platform'
      - 'managed'
      - '--region'
      - 'europe-west1'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/orion-app:latest'
